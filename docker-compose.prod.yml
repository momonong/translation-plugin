# ==========================================
# Production / Workstation Configuration
# Usage: docker compose -f docker-compose.prod.yml up -d
# ==========================================
services:
  lexilight_backend:
    image: momonong/lexilight:${IMAGE_TAG:-latest}
    container_name: lexilight_backend
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "8005:8080"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/pdf_files:/app/pdf_files
      - ./secret/lexilight-vision-sa.json:/app/secret/lexilight-vision-sa.json:ro
    networks:
      - default
      - global-proxy-net

networks:
  default:
  global-proxy-net:
    external: true