# ==========================================
# Development / Build Configuration
# Usage: docker compose build && docker compose push
# ==========================================
services:
  lexilight_backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      tags:
        - "momonong/lexilight:${IMAGE_TAG:-latest}"
        - "momonong/lexilight:latest"
    image: momonong/lexilight:${IMAGE_TAG:-latest}
    container_name: lexilight_backend_dev
    env_file:
      - .env
    environment:
      - ROOT_PATH=
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    networks:
      - default

networks:
  default:
    driver: bridge
